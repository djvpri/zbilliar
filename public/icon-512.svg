<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="110" fill="#185FA5"/>
  <!-- billiard ball -->
  <circle cx="256" cy="230" r="145" fill="#1a6ab5"/>
  <circle cx="256" cy="230" r="134" fill="white"/>
  <!-- stripe band -->
  <clipPath id="c2"><circle cx="256" cy="230" r="134"/></clipPath>
  <rect x="122" y="194" width="268" height="72" fill="#185FA5" clip-path="url(#c2)"/>
  <!-- Z text on white part -->
  <text x="256" y="186" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="68" fill="#185FA5">Z</text>
  <!-- number on stripe -->
  <text x="256" y="252" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="48" fill="white">8</text>
  <!-- bottom text -->
  <text x="256" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="48" fill="white" letter-spacing="2">ZBilliar</text>
</svg>
