<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="40" fill="#185FA5"/>
  <!-- billiard ball -->
  <circle cx="96" cy="88" r="54" fill="#1a6ab5"/>
  <circle cx="96" cy="88" r="50" fill="white"/>
  <!-- stripe band -->
  <clipPath id="c1"><circle cx="96" cy="88" r="50"/></clipPath>
  <rect x="46" y="72" width="100" height="32" fill="#185FA5" clip-path="url(#c1)"/>
  <!-- Z text on white part -->
  <text x="96" y="70" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="26" fill="#185FA5">Z</text>
  <!-- number on stripe -->
  <text x="96" y="95" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="18" fill="white">8</text>
  <!-- bottom text -->
  <text x="96" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="18" fill="white" letter-spacing="1">ZBilliar</text>
</svg>
